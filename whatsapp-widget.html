<!-- Botón flotante WhatsApp -->
<style>
  .wa-widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .wa-bubble {
    background: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    max-width: 220px;
    font-size: 14px;
    color: #111;
    line-height: 1.4;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .wa-bubble strong {
    display: block;
    margin-bottom: 4px;
    color: #075e54;
  }

  .wa-btn {
    width: 58px;
    height: 58px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(37,211,102,0.5);
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .wa-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(37,211,102,0.6);
  }

  .wa-btn svg {
    width: 30px;
    height: 30px;
    fill: #fff;
  }

  .wa-pulse {
    position: absolute;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: rgba(37, 211, 102, 0.4);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%   { transform: scale(1); opacity: 0.7; }
    70%  { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="wa-widget" id="waWidget">
  <!-- Globo de texto (aparece al hover) -->
  <div class="wa-bubble" id="waBubble">
    <strong>¡Hola! 👋</strong>
    ¿En qué podemos ayudarte hoy? Chateá con nosotros.
  </div>

  <!-- Botón -->
  <div style="position:relative;">
    <div class="wa-pulse"></div>
    <a
      class="wa-btn"
      id="waLink"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Chatear por WhatsApp"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    </a>
  </div>
</div>

<script>
  (function () {
    // =====================================================
    // CONFIGURACIÓN — editá estos valores
    // =====================================================
    var PHONE    = "18099595863";           // número conectado al bot (sin + ni espacios)
    var MESSAGE  = "Hola! Me contacto desde la web de Kaizen Home RD. Quisiera más información sobre sus servicios.";
    var DELAY_BUBBLE = 3000;               // milisegundos hasta que aparece el globo (3s)
    // =====================================================

    var link   = document.getElementById("waLink");
    var bubble = document.getElementById("waBubble");

    // Arma el link de WhatsApp
    link.href = "https://wa.me/" + PHONE + "?text=" + encodeURIComponent(MESSAGE);

    // Muestra el globo después del delay
    setTimeout(function () {
      bubble.style.display = "block";
    }, DELAY_BUBBLE);

    // Oculta el globo al hacer clic
    link.addEventListener("click", function () {
      bubble.style.display = "none";
    });

    // Toggle del globo al hacer hover
    link.addEventListener("mouseenter", function () {
      bubble.style.display = "block";
    });
  })();
</script>
